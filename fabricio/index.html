<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="fabricio davyd">
    <title>Página Estilizada com Imagem</title>
    
    <style>
        /* Estilização do Cabeçalho */
        header {
            background-color: #183C63;
            color: #FFFFFF;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px; 
        }

        /* Estilização do Conteúdo Principal */
        main {
            background-color: #FFFFFF;
            color: #183C63;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Nova estilização da imagem adicionada nesta aula */
        img {
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_wc3uwpwc3uwpwc3u.png" alt="logotipo conceitual de tecnologia e educação: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">
        <h1>Meu Primeiro Blog</h1>
        <p>Autor: fabricio davyd</p>
    </header>

    <main>
        <h2>Primeiro Post</h2>
        <p>Este é o conteúdo do primeiro post. Agora ele possui espaçamento interno (padding) de 16px, evitando que o texto fique colado nas bordas e tornando a leitura muito mais agradável.</p>
    </main>

</body>
</html>
